<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors</title>
</head>

<body>

<p>Rock Paper Scissors</p>

<button onclick="playermove('Rock')">Rock</button>
<button onclick="playermove('Paper')">Paper height="20"></button>
<button onclick="playermove('Scissors')" >Scissors</button>

<script>

let score = JSON.parse(localStorage.getItem('score'));

if (!score){
    score = {
        Wins: 0,
        Loss: 0,
        Ties: 0
    };
}

function computermove(){

    let random = Math.random();
    let result = '';

    if(random < 1/3){
        result = 'Rock';
    }else if(random < 2/3){
        result = 'Paper';
    }else{
        result = 'Scissors';
    }

    return result;
}

function playermove(move){

    let computer = computermove();
    let result2 = '';

    if (move === 'Rock'){
        if (computer === 'Rock'){
            result2 = 'Tie';
        } else if(computer === 'Paper'){
            result2 = 'You lose';
        }else{
            result2 ='You win';
        }
    }

    if (move === 'Paper'){
        if (computer === 'Rock'){
            result2 = 'You win';
        } else if(computer === 'Paper'){
            result2 = 'Tie';
        }else{
            result2 ='You lose';
        }
    }

    if (move === 'Scissors'){
        if (computer === 'Rock'){
            result2 = 'You lose';
        } else if(computer === 'Paper'){
            result2 = 'You win';
        }else{
            result2 ='Tie';
        }
    }

    // update score
    if(result2 === 'You win'){
        score.Wins++;
    }else if(result2 === 'You lose'){
        score.Loss++;
    }else{
        score.Ties++;
    }
    console.log(  navigator.geolocation.getCurrentPosition)

    localStorage.setItem('score', JSON.stringify(score));

    alert(`Player move: ${move}
Computer move: ${computer}
Result: ${result2}

Wins: ${score.Wins}
Loss: ${score.Loss}
Ties: ${score.Ties}`);

}

</script>

</body>
</html>
